<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Translate Block</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 data-i18n="title">🌐 Translate Block</h1>
    
    <div class="language-selectors">
      <div class="selector-group">
        <label for="fromLanguage" data-i18n="fromLanguage">From:</label>
        <select id="fromLanguage">
          <option value="auto" data-i18n="autoDetect">Auto Detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="tr">Turkish</option>
          <option value="pl">Polish</option>
          <option value="uk">Ukrainian</option>
        </select>
      </div>
      
      <div class="selector-group">
        <label for="toLanguage" data-i18n="toLanguage">To:</label>
        <select id="toLanguage">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru" selected>Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="tr">Turkish</option>
          <option value="pl">Polish</option>
          <option value="uk">Ukrainian</option>
        </select>
      </div>
    </div>
    
    <div class="button-group">
      <button id="selectElementBtn" class="primary-btn" data-i18n="selectElementBtn">
        📍 Select HTML Element
      </button>
      <button id="cancelSelectionBtn" class="secondary-btn" disabled data-i18n="cancelBtn">
        ✕ Cancel
      </button>
    </div>
    
    <div id="status" class="status"></div>
    
    <div class="footer">
      <a href="#" id="settingsLink" data-i18n="settingsLink">⚙️ Settings</a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
