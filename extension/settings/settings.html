<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Translate Block - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="settingsTitle">🌐 Auto Translate Block Settings</h1>
    </header>

    <main>
      <section class="settings-section">
        <h2 data-i18n="languageSettings">Language Settings</h2>
        
        <div class="form-group">
          <label for="uiLanguage">🌍 Interface Language:</label>
          <select id="uiLanguage">
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="fromLanguage" data-i18n="sourceLanguage">Source Language:</label>
          <select id="fromLanguage">
            <option value="auto" data-i18n="autoDetect">Auto Detect</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="tr">Turkish</option>
            <option value="pl">Polish</option>
            <option value="uk">Ukrainian</option>
          </select>
        </div>

        <div class="form-group">
          <label for="toLanguage" data-i18n="targetLanguage">Target Language:</label>
          <select id="toLanguage">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ru" selected>Russian</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="tr">Turkish</option>
            <option value="pl">Polish</option>
            <option value="uk">Ukrainian</option>
          </select>
        </div>
      </section>

      <section class="settings-section">
        <h2 data-i18n="appearanceSettings">Appearance</h2>
        
        <div class="form-group">
          <label for="highlightColor" data-i18n="highlightColor">Highlight Color:</label>
          <input type="color" id="highlightColor" value="#00bfff">
        </div>

        <div class="form-group">
          <label for="highlightOpacity" data-i18n="highlightOpacity">Highlight Opacity:</label>
          <input type="range" id="highlightOpacity" min="0.1" max="1" step="0.1" value="0.3">
          <span id="opacityValue">0.3</span>
        </div>
      </section>

      <section class="settings-section">
        <h2 data-i18n="advancedSettings">Advanced</h2>
        
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="preserveFormatting">
            <span data-i18n="preserveFormatting">Preserve HTML formatting</span>
          </label>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="translateAttributes" checked>
            <span data-i18n="translateAttributes">Translate alt and title attributes</span>
          </label>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="showNotifications" checked>
            <span data-i18n="showNotifications">Show translation notifications</span>
          </label>
        </div>
      </section>

      <div class="button-group">
        <button id="saveBtn" class="primary-btn" data-i18n="saveSettings">Save Settings</button>
        <button id="resetBtn" class="secondary-btn" data-i18n="resetSettings">Reset to Defaults</button>
      </div>

      <div id="status" class="status"></div>
    </main>
  </div>

  <script src="settings.js"></script>
</body>
</html>
